apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inotes-api
  namespace: inotes
  annotations:
    # Example for AWS ALB — adjust for your ingress controller
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: inotes-api
                port:
                  number: 80
