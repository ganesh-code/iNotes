name: Deploy Frontend to AWS S3 + CloudFront

on:
  push:
    branches: [main]
    paths:
      - 'client/**'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install backend dependencies (for config scripts)
        working-directory: backendset
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Load configuration from AWS Secrets Manager
        if: ${{ secrets.AWS_SECRETS_MANAGER_SECRET_ID != '' }}
        env:
          AWS_SECRETS_MANAGER_SECRET_ID: ${{ secrets.AWS_SECRETS_MANAGER_SECRET_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          USE_AWS_SECRETS: 'true'
        run: node scripts/ci-load-aws-secrets.js

      - name: Generate client config (without AWS)
        if: ${{ secrets.AWS_SECRETS_MANAGER_SECRET_ID == '' }}
        env:
          REACT_APP_API_URL: ${{ secrets.API_URL }}
          API_URL: ${{ secrets.API_URL }}
        run: node scripts/generate-client-config.js

      - name: Build
        working-directory: client
        env:
          REACT_APP_API_URL: ${{ env.REACT_APP_API_URL || secrets.API_URL }}
          CI: false
        run: npm run build

      - name: Sync to S3
        run: |
          aws s3 sync client/build/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html" \
            --exclude "*.json"
          aws s3 sync client/build/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "no-cache,no-store,must-revalidate" \
            --include "index.html" \
            --include "*.json"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Notify
        run: echo "✅ Frontend deployed to CloudFront!"
