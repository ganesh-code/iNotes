services:

  backend:
    build:
      context: ./backendset
    container_name: inotes-backend
    ports:
      - "5500:5500"
    env_file:
      - .env

  frontend:
    build:
      context: ./client
    container_name: inotes-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
